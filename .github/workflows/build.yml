# The GCC toolchain is stored in the GitHub Actions cache after being built. To
# minimize build times, the toolchain build step is skipped if there is a cached
# copy of the toolchain that has not expired.

name: Build
on:   [ push, pull_request ]

jobs:
  build:
    name:    Run build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Initialize toolchain cache
      id:   cache
      uses: actions/cache@v5
      with:
        key:  toolchain
        path: gcc-mipsel-none-elf

    - name: Fetch repo contents
      uses: actions/checkout@v6
      with:
        path: ps1-ram-tester

    - name: Install prerequisites
      run: |
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends ninja-build mame-tools

    - name: Set up Python virtual environment
      run: |
        python3 -m venv ps1-ram-tester/env
        source ps1-ram-tester/env/bin/activate
        pip3 install -r ps1-ram-tester/tools/requirements.txt

    - name: Build GCC toolchain
      if:   ${{ steps.cache.outputs.cache-hit != 'true' }}
      run: |
        ps1-ram-tester/.github/scripts/buildToolchain.sh gcc-mipsel-none-elf mipsel-none-elf

    - name: Build project
      run: |
        ps1-ram-tester/.github/scripts/buildRelease.sh

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name:              build
        if-no-files-found: error
        path:              ps1-ram-tester-*.zip

    - name: Publish release
      if:   ${{ github.ref_type == 'tag' }}
      uses: softprops/action-gh-release@v3
      with:
        fail_on_unmatched_files: true
        files:                   ps1-ram-tester-*.zip
